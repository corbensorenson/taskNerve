version: 1
interface:
  id: tasknerve
  display_name: TaskNerve Operator
  short_description: Run project work through TaskNerve controller/worker orchestration, task drawer flow, and project contract docs.
  default_prompt: >-
    Operate this project through TaskNerve's native workflow in Codex. Use
    project settings for policy, task drawer for active queue work, keep
    project_goals.md and project_manifest.md aligned with execution, and keep
    controller/worker flow clear, responsive, and task-aware.
