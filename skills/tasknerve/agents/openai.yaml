version: 1
interface:
  id: tasknerve
  display_name: TaskNerve Operator
  short_description: Run project work through TaskNerve controller/worker orchestration, task drawer flow, and project contract docs.
  default_prompt: >-
    Operate this project through TaskNerve's native workflow in Codex. Use
    project settings for policy, task drawer for active queue work, keep
    project_goals.md, project_manifest.md, contributing_ideas.md,
    levers_pitfalls.md, research.md, taskNerve/creating_project_skill.md,
    taskNerve/using_project_skill.md, and the mirrored taskNerve contract
    pack (including taskNerve/launch_project.sh) aligned with execution, and keep
    controller/worker flow clear, responsive, and task-aware. For external
    issue intake, keep a review-first queue and apply malice/noise filters
    before anything becomes a task. Prefer small (xs/s) scoped tasks and fill
    structured task fields for worker clarity: objective, task_type, subsystem,
    files_in_scope, out_of_scope, acceptance_criteria, deliverables,
    verification_steps, implementation_notes, risk_notes, and estimated_effort.
