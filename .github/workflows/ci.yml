name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  rust-quality:
    name: Rust Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format Check
        run: cargo fmt --check

      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log

      - name: Clippy Summary
        if: always()
        shell: bash
        run: |
          if [ -f clippy.log ]; then
            python3 scripts/annotate-clippy-log.py clippy.log
            {
              echo '### Clippy Output'
              echo
              echo '```text'
              tail -n 200 clippy.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Clippy Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log-${{ matrix.os }}
          path: clippy.log
          if-no-files-found: ignore

      - name: Publish Clippy Details
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('clippy.log')) {
              return;
            }
            const log = fs
              .readFileSync('clippy.log', 'utf8')
              .split(/\r?\n/)
              .slice(-200)
              .join('\n');
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: `Clippy Details (${process.env.RUNNER_OS || 'unknown'})`,
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'failure',
              output: {
                title: 'Clippy Output',
                summary: `\`\`\`text\n${log}\n\`\`\``,
              },
            });

      - name: Test
        run: cargo test

  installer-smoke-unix:
    name: Installer Smoke (Unix)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Binary
        run: |
          bash ./install.sh --install-dir "$RUNNER_TEMP/tasknerve-bin" --skip-rust-install --with-skill --overwrite-skill

      - name: Validate Binary
        run: |
          "$RUNNER_TEMP/tasknerve-bin/tasknerve" --help
          "$RUNNER_TEMP/tasknerve-bin/tasknerve" skill doctor

  installer-smoke-windows:
    name: Installer Smoke (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Binary
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\install-windows.ps1 -InstallDir "$env:RUNNER_TEMP\tasknerve-bin" -SkipRustInstall -NoPathUpdate -WithSkill -OverwriteSkill

      - name: Validate Binary
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\tasknerve-bin\tasknerve.exe" --help
          & "$env:RUNNER_TEMP\tasknerve-bin\tasknerve.exe" skill doctor
