name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-quality:
    name: Rust Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format Check
        run: cargo fmt --check

      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log

      - name: Clippy Summary
        if: always()
        shell: bash
        run: |
          if [ -f clippy.log ]; then
            python3 - <<'PY'
            import pathlib
            import re

            lines = pathlib.Path("clippy.log").read_text(errors="replace").splitlines()
            emitted = 0
            for index, line in enumerate(lines):
                stripped = line.strip()
                if not stripped.startswith(("warning:", "error:")):
                    continue
                level = "error" if stripped.startswith("error:") else "warning"
                message = stripped.split(": ", 1)[1] if ": " in stripped else stripped
                location = None
                for candidate in lines[index + 1:index + 8]:
                    match = re.match(r"\s*--> ([^:]+):(\d+):(\d+)", candidate)
                    if match:
                        location = match.groups()
                        break
                if location:
                    file_path, line_no, col_no = location
                    print(f"::{level} file={file_path},line={line_no},col={col_no}::{message}")
                else:
                    print(f"::{level}::{message}")
                emitted += 1
                if emitted >= 25:
                    break
            PY
            {
              echo '### Clippy Output'
              echo
              echo '```text'
              tail -n 200 clippy.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Clippy Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log-${{ matrix.os }}
          path: clippy.log
          if-no-files-found: ignore

      - name: Test
        run: cargo test

  installer-smoke-unix:
    name: Installer Smoke (Unix)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Binary
        run: |
          bash ./install.sh --install-dir "$RUNNER_TEMP/fugit-bin" --skip-rust-install --with-skill --overwrite-skill

      - name: Validate Binary
        run: |
          "$RUNNER_TEMP/fugit-bin/fugit" --help
          "$RUNNER_TEMP/fugit-bin/fugit" skill doctor

  installer-smoke-windows:
    name: Installer Smoke (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Binary
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\install-windows.ps1 -InstallDir "$env:RUNNER_TEMP\fugit-bin" -SkipRustInstall -NoPathUpdate -WithSkill -OverwriteSkill

      - name: Validate Binary
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\fugit-bin\fugit.exe" --help
          & "$env:RUNNER_TEMP\fugit-bin\fugit.exe" skill doctor
